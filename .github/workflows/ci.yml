name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: helpdesk
          POSTGRES_PASSWORD: helpdesk
          POSTGRES_DB: helpdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://helpdesk:helpdesk@localhost:5432/helpdesk_test?schema=public
      JWT_SECRET: ci-secret
      JWT_EXPIRES_IN: 1h
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      # TODO(sprint-2): adicionar step de lint quando ESLint estiver configurado
      - run: npm test -- --runInBand
      - run: npm run build
